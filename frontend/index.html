<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Global-Fi Ultra — Real-time financial data, AI insights, and portfolio management." />
    <meta name="theme-color" content="#0d0d12" />
    <title>Global-Fi Ultra</title>
    <script>
      // Dark is the default — apply .light class only when light mode is selected.
      // This runs before React renders to prevent any flash of wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('gfu_theme') || 'dark';
          var isLight = t === 'light' || (t === 'system' && !window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isLight) document.documentElement.classList.add('light');
        } catch (e) {
          // stay dark (default)
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
